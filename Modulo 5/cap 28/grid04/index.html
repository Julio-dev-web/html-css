<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<link rel="stylesheet" href="">
<style>

        *{
            margin:0 ;
            padding:0 ;

        }

        body{

            text-align:center;
            

        }

        .container{

                /* border: 3px dotted red; */
                display:grid;
                grid-template: repeat(4, 100px)/ repeat(4, 1fr);
                gap:5px;
                

        }

        .item1{

            border: 3px dotted green;
            grid-row-start:1 ;
            grid-row-end: 2;
            grid-column-start:1 ;
            grid-column-end: 5;
            background-color: brown;
        }

        .item2{

            border: 3px dotted green;
            grid-row-start: 2;
            grid-row-end: 4;
            grid-column-start:1 ;
            grid-column-end: 3;
            background-color: royalblue;
        }

        .item3{

            border: 3px dotted green;
            grid-row-start:2 ;
            grid-row-end: 4;
            grid-column-start:3;
            grid-column-end: 5;
            background-color: violet;
        }

        .item4{

            border: 3px dotted green;
            grid-row-start:4 ;
            grid-row-end:5 ;
            grid-column-start:1;
            grid-column-end:5 ;
            background-color: yellow;
        }

       



</style>
</head>
<body>
    
    <div class="container">
    
        <div class="item1">Caixa1</div>
        <div class="item2">Caixa2</div>
        <div class="item3">Caixa3</div>
        <div class="item4">Caixa4</div>

    
    
    
    </div>


<script></script>
<script src=""></script>
</body>
</html>
